annotation: 'The classic T-maze task from Active Inference literature (Friston et
  al.):


  - Agent navigates a T-shaped maze with 4 locations: center, left arm, right arm,
  cue location

  - Two observation modalities: location (where am I?) and reward/cue (what do I see?)

  - Reward is hidden behind one of the two arms (left or right), determined by context

  - Cue location provides partial information about which arm holds the reward

  - Agent must decide: go directly to an arm (exploit) or visit cue location first
  (explore)

  - Demonstrates epistemic foraging: Active Inference naturally balances exploration
  vs exploitation

  - The Expected Free Energy decomposes into epistemic (information gain) + instrumental
  (reward) value'
