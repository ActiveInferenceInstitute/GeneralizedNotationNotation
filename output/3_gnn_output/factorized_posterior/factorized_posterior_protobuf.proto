syntax = "proto3";

package factorized_posterior_agent;

// GNN Model: Factorized Posterior Agent
// Annotation: A mean-field factorized POMDP agent. The joint posterior over two
independent state factors `s_1` (location) and `s_2` (goal identity) is
approximated as the product of marginals Q(s_1, s_2) = Q(s_1) * Q(s_2).
This is the canonical simplification used in variational inference when
exact joint posteriors are computationally intractable.

- Two state factors: location (4 states), goal (2 states)
- Two observation modalities: visual (3 obs), proprioceptive (2 obs)
- Separate transition matrices B_1 (location × action) and B_2 (goal is static)
- Explicit factorization declared in ## Equations
- Tests multi-factor / multi-modality handling in the parser
// Generated by GNN Protobuf Serializer

message Variable {{
  string name = 1;
  string var_type = 2;
  string data_type = 3;
  repeated int32 dimensions = 4;
  string description = 5;
}}

message Connection {{
  repeated string source_variables = 1;
  repeated string target_variables = 2;
  string connection_type = 3;
  string description = 4;
}}

message Parameter {{
  string name = 1;
  string value = 2;
  string param_type = 3;
}}

message Equation {{
  string equation = 1;
  string type = 2;
}}

message TimeSpecification {{
  string time_type = 1;
  int32 steps = 2;
  string description = 3;
}}

message OntologyMapping {{
  string variable_name = 1;
  string ontology_term = 2;
}}

message GNNModel {{
  string name = 1;
  string annotation = 2;
  repeated Variable variables = 3;
  repeated Connection connections = 4;
  repeated Parameter parameters = 5;
  repeated Equation equations = 6;
  TimeSpecification time_specification = 7;
  repeated OntologyMapping ontology_mappings = 8;
}}

