syntax = "proto3";

package three_level_temporal_hierarchy_agent;

// GNN Model: Three-Level Temporal Hierarchy Agent
// Annotation: A three-level hierarchical Active Inference agent with distinct temporal scales:

- Level 0 (fast, 100ms): Sensorimotor control — immediate reflexive responses
- Level 1 (medium, 1s): Tactical planning — goal-directed behavior sequences
- Level 2 (slow, 10s): Strategic planning — long-term objective management
- Top-down flow: Strategy sets tactical goals, tactics set sensorimotor preferences
- Bottom-up flow: Sensorimotor observations inform tactical beliefs, tactical outcomes inform strategy
- Each level maintains its own generative model with A, B, C, D matrices
- Timescale separation encoded via update ratios (Level 2 updates every 10 Level 0 steps)
- Demonstrates deep temporal models from Friston et al. hierarchical Active Inference
// Generated by GNN Protobuf Serializer

message Variable {{
  string name = 1;
  string var_type = 2;
  string data_type = 3;
  repeated int32 dimensions = 4;
  string description = 5;
}}

message Connection {{
  repeated string source_variables = 1;
  repeated string target_variables = 2;
  string connection_type = 3;
  string description = 4;
}}

message Parameter {{
  string name = 1;
  string value = 2;
  string param_type = 3;
}}

message Equation {{
  string equation = 1;
  string type = 2;
}}

message TimeSpecification {{
  string time_type = 1;
  int32 steps = 2;
  string description = 3;
}}

message OntologyMapping {{
  string variable_name = 1;
  string ontology_term = 2;
}}

message GNNModel {{
  string name = 1;
  string annotation = 2;
  repeated Variable variables = 3;
  repeated Connection connections = 4;
  repeated Parameter parameters = 5;
  repeated Equation equations = 6;
  TimeSpecification time_specification = 7;
  repeated OntologyMapping ontology_mappings = 8;
}}

