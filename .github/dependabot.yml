# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  - package-ecosystem: pip
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 15
    rebase-strategy: auto
    commit-message:
      prefix: "deps(pip)"
    labels:
      - dependencies
      - python
    groups:
      pip-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: "UTC"
    rebase-strategy: auto
    commit-message:
      prefix: "deps(actions)"
    labels:
      - dependencies
      - github-actions
