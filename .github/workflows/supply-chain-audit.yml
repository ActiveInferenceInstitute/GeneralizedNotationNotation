# Scheduled audit of the resolved lockfile (complements Dependabot + dependency-review on PRs).
name: Supply chain audit

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: supply-chain-audit-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  pip-audit:
    name: pip-audit (core dependencies)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Export requirements (no project line, no hashes)
        run: |
          set -euo pipefail
          uv export --frozen --no-dev --no-hashes --no-emit-project -o /tmp/requirements-audit.txt

      - name: Run pip-audit
        id: audit
        run: |
          set -euo pipefail
          uv tool run pip-audit -r /tmp/requirements-audit.txt --vulnerability-service osv --desc on

      - name: Summary
        if: always()
        run: |
          {
            echo "### pip-audit (core)"
            echo ""
            echo "- Outcome: **${{ steps.audit.outcome }}**"
            echo "- Lockfile export: \`/tmp/requirements-audit.txt\` (generated in prior step)"
          } >> "$GITHUB_STEP_SUMMARY"

  pip-audit-all-extras:
    name: pip-audit (all optional extras, no dev)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Export requirements
        run: |
          set -euo pipefail
          uv export --frozen --all-extras --no-dev --no-hashes --no-emit-project -o /tmp/requirements-all-extras.txt

      - name: Run pip-audit
        id: audit
        run: |
          set -euo pipefail
          uv tool run pip-audit -r /tmp/requirements-all-extras.txt --vulnerability-service osv --desc on

      - name: Summary
        if: always()
        run: |
          {
            echo "### pip-audit (all extras, no dev)"
            echo ""
            echo "- Outcome: **${{ steps.audit.outcome }}**"
          } >> "$GITHUB_STEP_SUMMARY"
