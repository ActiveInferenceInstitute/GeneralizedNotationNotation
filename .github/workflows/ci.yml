name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "doc/**"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "doc/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies (dev)
        run: uv sync --frozen --extra dev

      - name: Run unit and integration tests (skip pipeline & MCP)
        id: pytest
        run: |
          mkdir -p junit
          uv run pytest -m "not pipeline and not mcp" \
            --tb=short \
            -q \
            --junitxml=junit/pytest-${{ matrix.python-version }}.xml

      - name: Pytest JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-junit-${{ matrix.python-version }}
          path: junit/pytest-${{ matrix.python-version }}.xml
          if-no-files-found: warn

      - name: Test job summary
        if: always()
        run: |
          {
            echo "### Tests (Python ${{ matrix.python-version }})"
            echo ""
            echo "Outcome: **${{ steps.pytest.outcome }}**"
            echo ""
            echo "JUnit XML is attached as artifact \`pytest-junit-${{ matrix.python-version }}\` when present."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: MCP tool count assertion
        if: matrix.python-version == '3.12'
        run: |
          uv run python - <<'PY'
          import sys
          sys.path.insert(0, "src")
          from tests.test_mcp_audit import count_mcp_tools

          count = count_mcp_tools()
          print(f"MCP tools: {count}")
          if count < 131:
              raise SystemExit(f"MCP tool count regression: {count} < 131")
          print("MCP tool count OK")
          PY

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies (dev)
        run: uv sync --frozen --extra dev

      - name: Ruff check
        run: uv run ruff check src/

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies (dev)
        run: uv sync --frozen --extra dev

      - name: Run Bandit scan (medium+ findings fail)
        id: bandit
        continue-on-error: true
        run: |
          uv run bandit -r src -c pyproject.toml \
            --severity-level medium \
            --confidence-level medium \
            -f json \
            -o bandit-results.json

      - name: Upload Bandit report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-results
          path: bandit-results.json
          if-no-files-found: warn

      - name: Fail if Bandit reported issues
        if: steps.bandit.outcome == 'failure'
        run: exit 1
