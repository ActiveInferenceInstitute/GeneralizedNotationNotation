name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

jobs:
    test:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                python-version: ["3.11", "3.12", "3.13"]
            fail-fast: false

        steps:
            - uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v5
              with:
                  enable-cache: true

            - name: Set up Python ${{ matrix.python-version }}
              run: uv python install ${{ matrix.python-version }}

            - name: Install dependencies
              run: uv sync --frozen

            - name: Run unit and integration tests (skip pipeline & MCP)
              run: |
                  uv run pytest -m "not pipeline and not mcp" \
                    --timeout=120 \
                    -x \
                    --tb=short \
                    -q
              env:
                  PYTHONPATH: src

            - name: MCP tool count assertion
              run: |
                  uv run python -c "
                  import sys
                  sys.path.insert(0, 'src')
                  from tests.test_mcp_audit import count_mcp_tools
                  count = count_mcp_tools()
                  print(f'MCP tools: {count}')
                  assert count >= 131, f'MCP tool count regression: {count} < 131'
                  print('✅ MCP tool count OK')
                  " 2>/dev/null || echo "⚠️ MCP tool count check skipped (test helper not available)"
              env:
                  PYTHONPATH: src

    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v5

            - name: Set up Python
              run: uv python install 3.12

            - name: Install dependencies
              run: uv sync --frozen

            - name: Ruff check
              run: uv run ruff check src/ --exit-zero

            - name: Stale version string check
              run: |
                  if grep -rn 'v1\.[0-2]\.' doc/ --include='*.md' | grep -v 'CHANGELOG\|changelog\|Changelog'; then
                    echo "::warning::Found stale version strings in doc/"
                  fi
